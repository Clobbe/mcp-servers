software-development-pipeline:
  description: "Full-cycle pipeline: Worktree → PRD → Architecture → TDD → Implementation → Validation → Security → Release. Supports TypeScript/JavaScript and .NET/C#."
  steps:
    - agent: worktree-agent
      prompt: "Create an isolated git worktree for this feature. Derive the branch name from the task description.\n\nTask: $ORIGINAL"

    - agent: prd-agent
      prompt: "Create a structured PRD for the following task. Work inside the worktree path provided. Detect the project language from the working directory.\n\nWorktree context: $INPUT\n\nTask: $ORIGINAL"

    - agent: architect-agent
      prompt: "Create a technical design document based on the following PRD. Work inside the worktree path from the setup context. Scan the existing codebase for patterns before designing.\n\nPRD + worktree context: $INPUT\n\nOriginal task: $ORIGINAL"

    - agent: tdd-agent
      prompt: "Write failing tests based on the PRD and technical design below. Work inside the worktree path. Map every acceptance criterion to at least one test case. Confirm tests are discoverable before finishing.\n\nPRD + Design + worktree context: $INPUT\n\nOriginal task: $ORIGINAL"

    - agent: implementation-agent
      prompt: "Implement code so all tests pass. Work inside the worktree path. Run the self-check suite (type check, issue detection, tests) before finishing. Do not hand off with failing self-checks.\n\nTest suite + design + worktree context: $INPUT\n\nOriginal task: $ORIGINAL"

    - agent: validation-agent
      prompt: "Perform a thorough code review of the implementation using all available analysis tools. Work inside the worktree path. Produce a structured PASS/FAIL report with required fixes and recommendations.\n\nImplementation + worktree context: $INPUT\n\nOriginal task: $ORIGINAL"

    - agent: security-agent
      prompt: "Perform a dedicated security review of the implementation. Work inside the worktree path. Run code_security_scan and manual pattern checks. Produce a severity-classified findings report.\n\nContext: $INPUT\n\nOriginal task: $ORIGINAL"

    - agent: release-agent
      prompt: "Prepare the implementation for release from the worktree branch: bump version, update changelog, create a pull request with structured description. The worktree path and branch are in the context below.\n\nContext: $INPUT\n\nOriginal task: $ORIGINAL"

tdd-implementation-loop:
  description: "Focused TDD loop: Worktree → write tests → implement → validate. No PRD or release steps."
  steps:
    - agent: worktree-agent
      prompt: "Create an isolated git worktree for this feature. Derive the branch name from the task description.\n\nTask: $ORIGINAL"

    - agent: tdd-agent
      prompt: "Write failing tests for the following feature. Work inside the worktree path provided.\n\nWorktree context: $INPUT\n\nFeature: $ORIGINAL"

    - agent: implementation-agent
      prompt: "Implement code so all tests pass. Work inside the worktree path. Run self-checks before finishing.\n\nTest + worktree context: $INPUT\n\nFeature: $ORIGINAL"

    - agent: validation-agent
      prompt: "Review the implementation inside the worktree. Check test coverage and code quality. Report PASS or FAIL with findings.\n\nContext: $INPUT\n\nFeature: $ORIGINAL"

prd-ralph-pipeline:
  description: "Automated PRD → RALPH implementation → local code review → release. Lighter-weight alternative to the full TDD pipeline: uses ralph_from_prd + ralph_loop for implementation, then gates on code-reviewer-agent before release."
  steps:
    - agent: worktree-agent
      prompt: "Create an isolated git worktree for this feature. Derive the branch name from the task description.\n\nTask: $ORIGINAL"

    - agent: prd-agent
      prompt: "Create a structured PRD for the following task. Work inside the worktree path provided. Detect the project language from the working directory.\n\nWorktree context: $INPUT\n\nTask: $ORIGINAL"

    - agent: ralph-agent
      prompt: "Generate and execute an implementation workflow from the PRD below using ralph_from_prd then ralph_loop. Work inside the worktree path. Use commit_per_phase: true. Report completed phases, failed tasks, and all artifacts created.\n\nPRD + worktree context: $INPUT\n\nOriginal task: $ORIGINAL"

    - agent: code-reviewer-agent
      prompt: "Run a full local pre-CI review of the implementation in the worktree. Check type errors, tests, coverage (≥80%), security (0 critical/high), complexity (≤15), and detected issues. Produce a structured PASS/FAIL report. On FAIL, list all required fixes.\n\nImplementation context: $INPUT\n\nOriginal task: $ORIGINAL"

    - agent: release-agent
      prompt: "Prepare the implementation for release from the worktree branch. Bump version, update changelog, create a pull request with structured description. Only proceed if the code review verdict is PASS — if the review shows FAIL, halt and return the findings.\n\nCode review + context: $INPUT\n\nOriginal task: $ORIGINAL"

code-review-pipeline:
  description: "Validation + security review only. Use on existing code without full pipeline."
  steps:
    - agent: validation-agent
      prompt: "Perform a thorough code review of the code at the path or described below. Use all available analysis tools.\n\nCode context: $ORIGINAL"

    - agent: security-agent
      prompt: "Perform a security review based on the validation findings below and the original code.\n\nValidation report: $INPUT\n\nOriginal context: $ORIGINAL"

pre-ci-check:
  description: "Standalone local pre-CI check. Run on any working directory to catch issues before pushing. Uses code-reviewer-agent with all code-tools checks."
  steps:
    - agent: code-reviewer-agent
      prompt: "Run a full local pre-CI review of the code at the path or working directory described below. Check: type errors, tests, coverage, security, complexity, and detected issues. Produce a structured PASS/FAIL report with actionable findings.\n\nContext: $ORIGINAL"

gh-issue-pipeline:
  description: "Issue-driven pipeline: pre-flight → fetch & classify → worktree → reproduce (bugs) → implement → security scan → quality gate → PR → post-PR comment & changelog. Pass the issue number, e.g. '#42' or 'issue #42: title'."
  steps:
    - agent: github-issue-agent
      prompt: |
        TASK: $ORIGINAL

        Step 1 — Pre-flight check + fetch issue.

        Before touching any code, verify the work isn't already in progress.

        Run with Bash tool:
        1. Extract the issue number from "$ORIGINAL" (e.g. "issue #42" → 42). Call it ISSUE_NUMBER.
        2. Detect the current repo: git remote get-url origin
        3. gh issue view <ISSUE_NUMBER> --json state,title | jq '{state,title}'
        4. gh pr list --search "closes #<ISSUE_NUMBER>" --json number,title,state,headRefName
        5. git branch -a | grep -i "issue-<ISSUE_NUMBER>\|fix/<ISSUE_NUMBER>"
        6. If PREFLIGHT=GO: fetch full issue detail:
           gh issue view <ISSUE_NUMBER> --json number,title,body,labels,assignees,state
           gh issue view <ISSUE_NUMBER> --comments
           gh issue edit <ISSUE_NUMBER> --add-label "in-progress" 2>/dev/null || true

        Report:
        - PREFLIGHT=GO if issue is open and no active PR/branch exists
        - PREFLIGHT=STOP with reason if closed, has an open PR, or has an active branch
        - Issue title, type (bug / feature / chore / infra — infer from labels + body), summary, recommended approach
        - Re-emit: ISSUE_NUMBER=<number>, ISSUE_TYPE=<bug|feature|chore|infra>, ISSUE_TITLE=<title>, REPO=<owner/repo>

        If PREFLIGHT=STOP, halt immediately.

    - agent: worktree-agent
      prompt: |
        PREFLIGHT + ISSUE CONTEXT:
        $INPUT

        ORIGINAL TASK: $ORIGINAL

        Step 2 — Create an isolated git worktree.

        Extract ISSUE_NUMBER and ISSUE_TITLE from $INPUT.
        Create a worktree with branch name: fix/issue-<ISSUE_NUMBER>-<short-title-slug>

        Re-emit at the end (unchanged):
        - ISSUE_NUMBER, ISSUE_TYPE, ISSUE_TITLE, REPO
        - WORKTREE_PATH=<absolute path>
        - BRANCH=<branch name>

    - agent: implementation-agent
      prompt: |
        ISSUE + WORKTREE CONTEXT:
        $INPUT

        ORIGINAL TASK: $ORIGINAL

        Step 3 — Reproduction check (bugs only).

        Extract ISSUE_TYPE from $INPUT. Work inside WORKTREE_PATH.

        If ISSUE_TYPE=bug:
          Try to surface the failure before fixing it:
          1. Run any existing test that covers the affected area (use the project's test runner)
          2. If no targeted test exists, grep the relevant code path for the key error term from the issue
          3. Confirm: REPRODUCED=YES/NO/INCONCLUSIVE with evidence

        If ISSUE_TYPE=feature or chore or infra:
          Skip. Report: REPRODUCED=N/A (not a bug)

        Re-emit: ISSUE_NUMBER, ISSUE_TYPE, ISSUE_TITLE, REPO, WORKTREE_PATH, BRANCH

    - agent: implementation-agent
      prompt: |
        REPRODUCTION RESULT:
        $INPUT

        ORIGINAL TASK: $ORIGINAL

        Step 4 — Implement the fix or feature.

        Work inside WORKTREE_PATH. Use Read and Bash (grep/find) to locate relevant files, then Edit to apply changes.

        Rules:
        - Follow the project's existing code style (detect from surrounding code)
        - Do NOT add connection strings, secrets, or credentials
        - Do NOT commit

        End your response with:
        - ISSUE_NUMBER, ISSUE_TITLE, REPO, WORKTREE_PATH, BRANCH
        - FILES_CHANGED=<comma-separated absolute paths>
        - CHANGE_SUMMARY=<one sentence>

    - agent: security-agent
      prompt: |
        IMPLEMENTATION RESULT:
        $INPUT

        ORIGINAL TASK: $ORIGINAL

        Step 5 — Security scan.

        Extract FILES_CHANGED from $INPUT. Work inside WORKTREE_PATH.

        Run with Bash tool against each file in FILES_CHANGED:
        1. grep -n 'password\|secret\|connectionString\|apiKey\|token\|-----BEGIN' <file> (case-insensitive)
        2. grep -n 'Process\.Start\|eval\|exec\|string\.Format.*SELECT\|string\.Concat.*WHERE' <file>
        3. For any package manifest in FILES_CHANGED, check for known-vulnerable dependency versions

        Report all findings with file path + line number + severity (CRITICAL/HIGH/MEDIUM).
        End with: SECURITY=PASS or SECURITY=FAIL

        Re-emit (unchanged): ISSUE_NUMBER, ISSUE_TITLE, REPO, WORKTREE_PATH, BRANCH, FILES_CHANGED, CHANGE_SUMMARY

    - agent: validation-agent
      prompt: |
        SECURITY SCAN RESULT:
        $INPUT

        ORIGINAL TASK: $ORIGINAL

        Step 6 — Quality gate: lint, build & test.

        Extract FILES_CHANGED from $INPUT. Work inside WORKTREE_PATH.
        If $INPUT contains SECURITY=FAIL, stop immediately — report VALIDATION=FAIL (blocked by security).

        Otherwise run with Bash tool (adapt commands to the project's language/toolchain):
        1. Lint / static analysis on changed source files
        2. Build the project
        3. Run tests (only if build succeeded) — capture pass/fail counts and failing test names
        4. TODO/FIXME check: grep -n 'TODO\|FIXME\|HACK' <each file in FILES_CHANGED>

        Report: lint result, build result, test result, TODO/FIXME findings.
        End with: VALIDATION=PASS or VALIDATION=FAIL

        Re-emit (unchanged): ISSUE_NUMBER, ISSUE_TITLE, REPO, WORKTREE_PATH, BRANCH, FILES_CHANGED, CHANGE_SUMMARY

    - agent: release-agent
      prompt: |
        QUALITY GATE RESULT:
        $INPUT

        ORIGINAL TASK: $ORIGINAL

        Step 7 — Commit, push and open a Pull Request.

        Extract ISSUE_NUMBER, ISSUE_TITLE, FILES_CHANGED, CHANGE_SUMMARY, VALIDATION, WORKTREE_PATH, BRANCH, REPO from $INPUT.

        If VALIDATION=FAIL, stop immediately — do NOT create a PR. Report the failure.

        Otherwise run with Bash tool inside WORKTREE_PATH:
        1. git status
        2. Stage only FILES_CHANGED (never git add -A):
           git add <each file individually>
        3. git commit -m "<type>: <ISSUE_TITLE shortened to ≤60 chars> (#<ISSUE_NUMBER>)"
           (no emoji, no Co-Authored-By, no "Generated with" attribution)
        4. git push -u origin <BRANCH>
        5. gh pr create \
             --title "<type>: <ISSUE_TITLE shortened>" \
             --body "Closes #<ISSUE_NUMBER>

        ## Changes
        <bullet list from CHANGE_SUMMARY>

        ## Test plan
        - [ ] Verify the fix locally
        - [ ] Review CI results" \
             --base main

        Report: PR_URL=<url>, BRANCH, COMMIT=<hash>, STATUS=SUCCESS or FAILURE
        Re-emit: ISSUE_NUMBER, REPO

    - agent: github-issue-agent
      prompt: |
        PR RESULT:
        $INPUT

        ORIGINAL TASK: $ORIGINAL

        Step 8 — Post-PR: issue comment and changelog entry.

        Extract ISSUE_NUMBER, PR_URL, STATUS, REPO from $INPUT.
        If STATUS=FAILURE, skip and report the upstream failure.

        Run with Bash tool:
        1. Post a comment on the issue:
           gh issue comment <ISSUE_NUMBER> --repo <REPO> \
             --body "A fix has been submitted in <PR_URL>. This issue will be closed once the PR is merged."

        2. Check for CHANGELOG.md in the working directory:
           ls -la CHANGELOG.md 2>/dev/null || echo "NO_CHANGELOG"
           readlink -f CHANGELOG.md 2>/dev/null || echo "NOT_A_SYMLINK"

        3. If CHANGELOG.md exists, prepend a new entry under [Unreleased]:
           "- <type>: <ISSUE_TITLE> (closes #<ISSUE_NUMBER>, <PR_URL>)"
           Use Edit tool. Do NOT create CHANGELOG.md if it doesn't exist.

        Report: issue comment URL, changelog update status (updated / skipped / not found), final STATUS=SUCCESS or FAILURE.

fix-externals-api-port:
  description: "Fix ca-externals-api startup probe failure (targetPort 80 to 8080) in dev and prod, then harden deploy workflows"
  steps:
    - agent: infra-engineer
      prompt: "You are fixing a critical Azure outage. The ca-anatolia-externals-api-dev Container App in rg-anatolia-dev has ingress targetPort=80 but the app binds to port 8080 (confirmed in logs: 'Now listening on http://[::]:8080'). The startup probe checks port 80, fails 600+ times, and kills the container every 4 minutes. The active revision is ActivationFailed/Unhealthy at 100% traffic.\n\nTASK - fix dev:\n1. Run: az containerapp ingress update --name ca-anatolia-externals-api-dev --resource-group rg-anatolia-dev --target-port 8080\n2. Sleep 45 seconds\n3. Run: az containerapp revision list -n ca-anatolia-externals-api-dev -g rg-anatolia-dev --query \"[?properties.active].{revision:name, health:properties.healthState, traffic:properties.trafficWeight, running:properties.runningState}\" -o table\n4. Run: az containerapp show -n ca-anatolia-externals-api-dev -g rg-anatolia-dev --query \"properties.configuration.ingress.targetPort\" -o tsv\n\nUse the Bash tool. End with: STATUS=SUCCESS or FAILURE, new revision name, health state, confirmed targetPort."
    - agent: infra-engineer
      prompt: "DEV FIX RESULT:\n$INPUT\n\nORIGINAL TASK: $ORIGINAL\n\nDev is fixed. Apply the same targetPort fix to production.\n\nTASK - fix prod:\n1. Run: az containerapp ingress update --name ca-anatolia-externals-api-prod --resource-group rg-anatolia-prod --target-port 8080\n2. Sleep 45 seconds\n3. Run: az containerapp revision list -n ca-anatolia-externals-api-prod -g rg-anatolia-prod --query \"[?properties.active].{revision:name, health:properties.healthState, traffic:properties.trafficWeight, running:properties.runningState}\" -o table\n4. Run: az containerapp show -n ca-anatolia-externals-api-prod -g rg-anatolia-prod --query \"properties.configuration.ingress.targetPort\" -o tsv\n\nUse the Bash tool. End with: STATUS=SUCCESS or FAILURE, new revision name, health state, confirmed targetPort."
    - agent: infra-engineer
      prompt: "DEV AND PROD FIX RESULTS:\n$INPUT\n\nORIGINAL TASK: $ORIGINAL\n\nBoth environments are fixed. Now harden the deploy workflows so a future infra re-deploy cannot silently reset targetPort back to 80.\n\nTASK - add --target-port 8080 to az containerapp update in both workflows:\n\nFILE 1: /Users/clobbster/dev/work/auag/code/anatolia/.github/workflows/build-and-deploy-dev.yml\nFind the 'Deploy Externals API to dev' step. In the az containerapp update command, add a new line '--target-port 8080 \\' after the --image line (before --set-env-vars).\n\nFILE 2: /Users/clobbster/dev/work/auag/code/anatolia/.github/workflows/deploy-prod.yml\nFind the 'Deploy Externals API to prod' step. Apply the same --target-port 8080 addition.\n\nSteps: Read each file with Read tool, make edits with Edit tool, verify with: grep -B2 -A12 'containerapp update' <file>\nDo NOT commit. Report what changed in each file and show grep verification output."

fix-skrapan-prod:
  description: "Trigger first-ever ca-skrapan prod execution and verify it starts"
  steps:
    - agent: infra-engineer
      prompt: "TASK: $ORIGINAL\n\nInspect the ca-skrapan Container App Job in both dev and prod.\n\nRun with Bash tool:\n1. az containerapp job show -n ca-anatolia-skrapan-dev -g rg-anatolia-dev --query \"{provisioningState:properties.provisioningState, triggerType:properties.configuration.triggerType, cronExpression:properties.configuration.scheduleTriggerConfig.cronExpression, replicaTimeout:properties.configuration.replicaTimeout, image:properties.template.containers[0].image, envVars:properties.template.containers[0].env}\" -o json\n2. az containerapp job show -n ca-anatolia-skrapan-prod -g rg-anatolia-prod --query \"{provisioningState:properties.provisioningState, triggerType:properties.configuration.triggerType, cronExpression:properties.configuration.scheduleTriggerConfig.cronExpression, replicaTimeout:properties.configuration.replicaTimeout, image:properties.template.containers[0].image, envVars:properties.template.containers[0].env}\" -o json\n3. az containerapp job execution list -n ca-anatolia-skrapan-dev -g rg-anatolia-dev --query \"[].{name:name, status:properties.status, started:properties.startTime, ended:properties.endTime}\" -o table\n4. az containerapp job execution list -n ca-anatolia-skrapan-prod -g rg-anatolia-prod --query \"[].{name:name, status:properties.status, started:properties.startTime, ended:properties.endTime}\" -o table\n5. grep -A15 'Deploy Skrapan to dev' /Users/clobbster/dev/work/auag/code/anatolia/.github/workflows/build-and-deploy-dev.yml\n\nReport: trigger types, last run dates, env vars on prod job vs what the workflow sets, any missing config."
    - agent: infra-engineer
      prompt: "INSPECTION RESULT:\n$INPUT\n\nORIGINAL TASK: $ORIGINAL\n\nca-skrapan-prod has never been executed (triggerType: Manual, zero executions). Trigger the first manual prod run.\n\nTASK:\n1. Run: az containerapp job start -n ca-anatolia-skrapan-prod -g rg-anatolia-prod\n2. Sleep 20 seconds\n3. Run: az containerapp job execution list -n ca-anatolia-skrapan-prod -g rg-anatolia-prod --query \"[].{name:name, status:properties.status, started:properties.startTime}\" -o table\n\nNOTE: The job has a 3600s timeout - do NOT wait for completion. SUCCESS = execution record exists with status Running or Succeeded.\n\nUse Bash tool. Report the execution name and current status."

fix-dataprotection-keys:
  description: "Resolve ASP.NET Core DataProtection unencrypted-key warning in Externals API"
  steps:
    - agent: infra-engineer
      prompt: "TASK: $ORIGINAL\n\nThe Externals API logs this on every startup in both envs: 'No XML encryptor configured. Key may be persisted to storage in unencrypted form.'\n\nInspect the current DataProtection setup.\n\nRun with Bash tool:\n1. grep -rn 'DataProtection\\|PersistKeys\\|ProtectKeysWith\\|AddDataProtection' /Users/clobbster/dev/work/auag/code/anatolia/Src/Apis/Externals/\n2. cat /Users/clobbster/dev/work/auag/code/anatolia/Src/Apis/Externals/Program.cs\n3. cat /Users/clobbster/dev/work/auag/code/anatolia/Src/Apis/Externals/Externals.csproj\n4. grep -rn 'cookie\\|Cookie\\|session\\|Session\\|antiforgery\\|AntiForgery' /Users/clobbster/dev/work/auag/code/anatolia/Src/Apis/Externals/\n\nReport: Is DataProtection configured? Does the API use cookies/sessions/anti-forgery? What packages are referenced? Recommended fix."
    - agent: infra-engineer
      prompt: "INSPECTION RESULT:\n$INPUT\n\nORIGINAL TASK: $ORIGINAL\n\nImplement the DataProtection fix for the Externals API. Working dir: /Users/clobbster/dev/work/auag/code/anatolia\n\nDECISION: If API uses only JWT/API-key auth (no cookies/sessions), configure key persistence to Azure Blob Storage so keys survive container restarts. Package: Azure.Extensions.AspNetCore.DataProtection.Blobs. Config: builder.Services.AddDataProtection().PersistKeysToAzureBlobStorage(new Uri(blobContainerUri), new DefaultAzureCredential(), 'externals-api-dp-keys'); where blobContainerUri comes from the Azure__BlobStorage__AccountEndpoint env var + container name. If API uses cookies/sessions, also add .ProtectKeysWithAzureKeyVault(...).\n\nSteps:\n1. Read Program.cs with Read tool\n2. Read Externals.csproj with Read tool\n3. Apply correct config using Edit tool (tabs not spaces, using directives alphabetically sorted)\n4. If new NuGet package needed run: cd /Users/clobbster/dev/work/auag/code/anatolia && dotnet add Src/Apis/Externals/Externals.csproj package <PackageName>\n5. Verify edit with Read tool\n\nDo NOT commit. Report what changed and show the new code block."
